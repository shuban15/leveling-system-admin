<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT TERMINAL | OVERRIDE MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-red: #ff0000;
            --system-bg: #050505;
            --panel-bg: #0a0a0a;
            --border: #1a1a1a;
            --text: #eee;
            --highlight: #00aaff;
        }

        body {
            background-color: var(--system-bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            height: 100vh;
        }

        /* Responsive Layout */
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
                grid-template-rows: 40% 60%;
            }
            body { overflow: auto; height: auto; }
        }

        /* Sidebar Directory */
        .sidebar {
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 2px solid var(--admin-red);
            text-align: center;
        }

        .hunter-list {
            overflow-y: auto;
            flex-grow: 1;
        }

        .hunter-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
        }

        .hunter-item:hover { background: rgba(255, 0, 68, 0.1); }
        .hunter-item.active { border-left: 4px solid var(--admin-red); background: rgba(255, 0, 68, 0.15); }

        /* Main Content */
        .main-content {
            padding: 20px;
            overflow-y: auto;
        }

        .profile-card {
            background: #0f0f0f;
            border: 1px solid var(--border);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input, select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px;
            font-family: inherit;
            box-sizing: border-box;
            margin-top: 5px;
        }

        label { font-size: 0.6rem; color: #666; text-transform: uppercase; }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn-save { background: var(--highlight); color: #000; width: 100%; }
        .btn-delete { 
            background: transparent; 
            border: 1px solid #444; 
            color: #444; 
            font-size: 0.7rem; 
            margin-top: 30px;
            width: 100%;
        }
        .btn-delete:hover { border-color: var(--admin-red); color: var(--admin-red); }

        .placeholder { text-align: center; color: #222; margin-top: 50px; }
        .hidden { display: none; }

    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <span style="color: var(--admin-red); font-size: 0.8rem;">SYSTEM ADMIN</span>
        </div>
        <div id="hunter-list" class="hunter-list"></div>
    </div>

    <div class="main-content">
        <div id="placeholder" class="placeholder">
            <h2>[ SELECT SUBJECT ]</h2>
        </div>

        <div id="editor-ui" class="profile-card hidden">
            <h3 id="display-name" style="color:var(--admin-red); margin:0 0 15px 0;">---</h3>
            
            <div class="grid">
                <div><label>Level</label><input type="number" id="ed-lvl"></div>
                <div><label>Stat Points</label><input type="number" id="ed-points"></div>
                <div><label>Exp</label><input type="number" id="ed-exp"></div>
                <div><label>Job</label><input type="text" id="ed-job"></div>
            </div>

            <div style="margin-top:15px;">
                <label>Quest Completed</label>
                <select id="ed-quest">
                    <option value="false">NO</option>
                    <option value="true">YES</option>
                </select>
            </div>

            <div style="margin-top:15px;">
                <label>Inventory (JSON)</label>
                <textarea id="ed-cargo" style="height: 100px;"></textarea>
            </div>
            <div style="margin-top:25px; padding-top:15px; border-top: 1px solid #222;">
                <label style="color:var(--admin-red); font-weight:bold;">COMMUNICATION HUB</label>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <input type="text" id="msg-input" placeholder="ENTER SYSTEM MESSAGE..." style="flex:1; border-color: #333;">
                    <button onclick="sendMessage()" class="btn" style="margin:0; background:var(--admin-red); color:white; width:100px; font-size:0.7rem;">SEND</button>
                </div>
                <p style="font-size:0.5rem; color:#444; margin-top:5px;">* MESSAGE WILL APPEAR ON THE HUNTER'S SCREEN INSTANTLY</p>
            </div>

            <button class="btn btn-save" onclick="applyOverride()">APPLY OVERRIDE</button>
            
            <!-- DELETE BUTTON -->
            <button class="btn btn-delete" onclick="deleteHunter()">DELETE SUBJECT FROM SYSTEM</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, collection, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBRAVqR1ZqthOmcYs9rxJULe7_w9AumJ4",
        authDomain: "levelling-faa1b.firebaseapp.com",
        projectId: "levelling-faa1b",
        storageBucket: "levelling-faa1b.firebasestorage.app",
        messagingSenderId: "586212668823",
        appId: "1:586212668823:web:12eac7b3e53e4c840e40d2",
        measurementId: "G-CZCSHWJD5E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let activeDocId = null;

    window.loadDirectory = async () => {
        const list = document.getElementById('hunter-list');
        const snap = await getDocs(collection(db, "hunters"));
        let hunters = [];
        snap.forEach(doc => hunters.push({id: doc.id, ...doc.data()}));
        hunters.sort((a,b) => a.name.localeCompare(b.name));

        list.innerHTML = hunters.map(h => `
            <div class="hunter-item" onclick="viewHunter('${h.id}', this)">
                <span>${h.name}</span>
                <span style="color:#444; font-size:0.6rem;">Lvl ${h.level}</span>
            </div>
        `).join('');
    };

    window.viewHunter = async (id, el) => {
        document.querySelectorAll('.hunter-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        const snap = await getDoc(doc(db, "hunters", id));
        if(snap.exists()){
            activeDocId = id;
            const data = snap.data();
            document.getElementById('display-name').innerText = data.name.toUpperCase();
            document.getElementById('ed-lvl').value = data.level;
            document.getElementById('ed-exp').value = data.exp;
            document.getElementById('ed-points').value = data.points;
            document.getElementById('ed-job').value = data.job;
            document.getElementById('ed-quest').value = data.questCompleted || false;
            document.getElementById('ed-cargo').value = JSON.stringify(data.cargo || {}, null, 2);
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('editor-ui').classList.remove('hidden');
            
            // On mobile, scroll down to the editor automatically
            if(window.innerWidth <= 768) {
                document.getElementById('editor-ui').scrollIntoView({behavior: 'smooth'});
            }
        }
    };

    window.applyOverride = async () => {
        try {
            const updated = {
                level: Number(document.getElementById('ed-lvl').value),
                exp: Number(document.getElementById('ed-exp').value),
                points: Number(document.getElementById('ed-points').value),
                job: document.getElementById('ed-job').value,
                questCompleted: document.getElementById('ed-quest').value === "true",
                cargo: JSON.parse(document.getElementById('ed-cargo').value)
            };
            await updateDoc(doc(db, "hunters", activeDocId), updated);
            alert("OVERRIDE COMPLETE");
            loadDirectory();
        } catch(e) { alert("ERROR IN DATA"); }
    };

    // --- DELETE FUNCTION ---
    window.deleteHunter = async () => {
        const confirmName = prompt("TO DELETE, TYPE 'CONFIRM':");
        if(confirmName === "CONFIRM") {
            await deleteDoc(doc(db, "hunters", activeDocId));
            alert("SUBJECT REMOVED FROM SYSTEM");
            activeDocId = null;
            document.getElementById('editor-ui').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
            loadDirectory();
        }
    };
    window.sendMessage = async () => {
        const msg = document.getElementById('msg-input').value.trim();
        const hunterName = document.getElementById('display-name').innerText;

        if (!msg) return alert("CANNOT SEND EMPTY MESSAGE");
        if (!activeDocId) return;

        try {
            // This pushes a message to a new 'notifications' collection
            await addDoc(collection(db, "notifications"), {
                target: hunterName.toLowerCase(), // Store in lowercase for easier matching
                message: msg,
                sender: "ARCHITECT",
                timestamp: Date.now(),
                read: false
            });

            alert(`MESSAGE TRANSMITTED TO ${hunterName}`);
            document.getElementById('msg-input').value = ""; // Clear input
        } catch (e) {
            console.error(e);
            alert("TRANSMISSION FAILED");
        }
    };

    loadDirectory();
</script>
</body>
</html>
